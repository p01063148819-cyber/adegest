kind = "web"
previewPath = "/"
title = "AdeGest"
version = "1.0.0"
id = "artifacts/adegest"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24957

[services.development]
run = "pnpm --filter @workspace/adegest run dev"

# No [services.production] block: this artifact is no longer deployed on its
# own. In production the API server (artifacts/api-server) builds and serves
# these static files directly (see artifacts/api-server/src/app.ts). The app
# is deployed to Railway, not Replit Deployments.

[services.env]
PORT = "24957"
BASE_PATH = "/"
